<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Discord Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #08080c;
      --surface: #0d0d12;
      --lift:    #131319;
      --border:  #1f1e27;
      --gold:    #c8a86a;
      --gold-hi: #e2c07c;
      --text:    #e8e2d5;
      --dim:     #575149;
      --mute:    #272420;
      --ok:      #4a8c5c;
      --err:     #9c4040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 26px 26px;
      font-size: 13px;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .wordmark {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--text);
    }
    .wordmark em {
      font-style: normal;
      color: var(--gold);
    }
    .header-tag {
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── Breathing rule — the signature ── */
    .rule {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--gold) 25%,
        var(--gold) 75%,
        transparent 100%
      );
      opacity: 0.2;
      margin-bottom: 24px;
      transition: opacity 0.8s ease;
    }
    .rule.playing {
      animation: breathe 2.8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.85; }
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px;
      margin-bottom: 22px;
    }
    .mode-btn {
      flex: 1;
      border: none;
      border-radius: 100px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--dim);
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active {
      background: var(--gold);
      color: #060407;
    }

    /* ── Panels ── */
    #section-system { display: none; margin-bottom: 18px; }
    #section-radio  { margin-bottom: 2px; }

    .sys-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 18px;
      text-align: center;
      line-height: 1.7;
    }
    .sys-card strong {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.03em;
      margin-bottom: 5px;
    }
    .sys-card span {
      font-size: 11.5px;
      color: var(--dim);
    }

    /* ── Field groups ── */
    .field-group { margin-bottom: 17px; }

    .field-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 9px;
      opacity: 0.85;
    }

    .field-wrap { position: relative; }
    .field-wrap::after {
      content: '›';
      position: absolute;
      right: 1px;
      top: 50%;
      transform: translateY(-52%) rotate(90deg);
      color: var(--gold);
      font-size: 15px;
      opacity: 0.55;
      pointer-events: none;
    }

    select {
      width: 100%;
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 5px 22px 9px 0;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { outline: none; border-bottom-color: var(--gold); }
    select option { background: #0f0f15; color: var(--text); }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 5px 0 9px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 300;
      transition: border-color 0.15s;
    }
    input[type="text"]::placeholder { color: var(--mute); }
    input[type="text"]:focus { outline: none; border-bottom-color: var(--gold); }

    /* ── Refresh ── */
    #refresh {
      background: none;
      border: none;
      color: var(--dim);
      font-family: inherit;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      margin-top: 2px;
      transition: color 0.15s;
    }
    #refresh:hover { color: var(--gold); }

    /* ── Volume ── */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0;
    }
    .vol-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      white-space: nowrap;
    }
    .vol-val {
      font-size: 10px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 0.06em;
      white-space: nowrap;
      min-width: 30px;
      text-align: right;
    }
    input[type="range"] {
      flex: 1;
      appearance: none;
      height: 1px;
      background: var(--border);
      border-radius: 1px;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      transition: transform 0.12s;
      box-shadow: 0 0 0 3px rgba(200, 168, 106, 0.12);
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.25); }
    input[type="range"]:focus { outline: none; }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }
    .btn {
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-family: inherit;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.08s;
    }
    .btn:active { transform: scale(0.97); }

    #play {
      background: var(--gold);
      color: #050306;
    }
    #play:hover { background: var(--gold-hi); }

    #stop {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
    }
    #stop:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.ok  { background: var(--ok); }
    .dot.err { background: var(--err); }

    #status {
      font-size: 11px;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0.02em;
      transition: color 0.3s;
    }
    #status.ok  { color: var(--ok); }
    #status.err { color: var(--err); }
  </style>
</head>
<body>

  <div class="header">
    <div class="wordmark">Discord <em>Audio</em></div>
    <div class="header-tag">Routing</div>
  </div>

  <div class="rule" id="rule"></div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="tab-radio">Radio</button>
    <button class="mode-btn" id="tab-system">System Audio</button>
  </div>

  <div id="section-radio">
    <div class="field-group">
      <label class="field-label" for="station">Station</label>
      <div class="field-wrap">
        <select id="station"></select>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="custom">Custom stream URL</label>
      <input id="custom" type="text" placeholder="https://  — leave blank to use station above" />
    </div>
  </div>

  <div id="section-system">
    <div class="sys-card">
      <strong>Everything playing on your PC</strong>
      <span>YouTube, Spotify, games — press Play to start routing.</span>
    </div>
  </div>

  <div class="field-group" id="field-listen">
    <label class="field-label" for="device-listen">Listen on</label>
    <div class="field-wrap">
      <select id="device-listen"></select>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label" for="device-discord">Send to Discord</label>
    <div class="field-wrap">
      <select id="device-discord"></select>
    </div>
  </div>

  <button id="refresh">↻ Refresh devices</button>

  <div class="vol-row">
    <span class="vol-label">Vol</span>
    <input id="volume" type="range" min="0" max="100" value="85" />
    <span class="vol-val" id="volval">85%</span>
  </div>

  <div class="controls">
    <button class="btn" id="play">▶ Play</button>
    <button class="btn" id="stop">■ Stop</button>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status">Idle</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
