<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Discord Audio</title>
</head>
<body>
  <h3>Discord Radio</h3>

  <div>
    <label for="station">Station</label>
    <select id="station"></select>
  </div>
  <div>
    <label for="custom">Custom stream URL</label>
    <input id="custom" type="text" placeholder="https://" />
  </div>

  <div>
    <label for="device-listen">Listen on</label>
    <select id="device-listen"></select>
  </div>
  <div>
    <label for="device-discord">Send to Discord</label>
    <select id="device-discord"></select>
  </div>
  <button id="refresh">Refresh devices</button>

  <div>
    <label for="volume">Volume</label>
    <input id="volume" type="range" min="0" max="100" value="85" />
    <span id="volval">85%</span>
  </div>

  <button id="play">Play</button>
  <button id="stop">Stop</button>

  <div id="status">Idle</div>

  <script src="renderer.js"></script>
</body>
</html>
